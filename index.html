<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111112">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111112;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f5f5f5;--text2:#aeaeb2;--text3:#636366;
  --accent:#34c759;--accent2:#2da847;--accentBg:rgba(52,199,89,0.12);
  --red:#ff453a;--amber:#ffd60a;--blue:#0a84ff;--purple:#bf5af2;--orange:#ff9f0a;
  --r:14px;--rs:10px;--rl:20px;--font:'Plus Jakarta Sans',sans-serif;--nav:64px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:var(--nav)}
#app::-webkit-scrollbar{display:none}
#app{scrollbar-width:none}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav);background:rgba(17,17,18,0.9);backdrop-filter:blur(20px);border-top:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 5px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;padding:8px 10px;transition:color 0.15s;-webkit-user-select:none;user-select:none;flex:1}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform 0.15s}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{transform:scale(1.1)}
.screen{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(17,17,18,0.95);backdrop-filter:blur(10px);z-index:10;border-bottom:0.5px solid var(--border)}
.h-back{display:flex;align-items:center;gap:4px;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 0;min-width:60px}
.h-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2}
.h-title{font-size:17px;font-weight:700;text-align:center}
.h-action{min-width:60px;display:flex;justify-content:flex-end}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.icon-btn:active{transform:scale(0.9)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.card-lg{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:20px;margin:0 16px 16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;border-radius:var(--r);padding:14px 20px;cursor:pointer;width:100%;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.97);opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);border-color:var(--accent2);color:#000}
.btn-accent:active{background:var(--accent2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-danger{background:rgba(255,69,58,0.1);border-color:rgba(255,69,58,0.2);color:var(--red)}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2}
input,textarea,select{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);font-family:var(--font);font-size:15px;border-radius:var(--rs);padding:13px 14px;width:100%;outline:none;transition:border-color 0.15s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::placeholder{color:var(--text3)}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin:0 16px 16px;gap:3px}
.tab{flex:1;text-align:center;padding:9px 6px;font-size:13px;font-weight:600;color:var(--text3);border-radius:var(--rs);cursor:pointer;transition:all 0.2s;-webkit-user-select:none;user-select:none;white-space:nowrap}
.tab.active{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.meal-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.meal-card:active{transform:scale(0.94);background:var(--bg3)}
.meal-card.full{grid-column:span 2;flex-direction:row;justify-content:center}
.meal-icon{font-size:34px}
.meal-label{font-size:14px;font-weight:700;color:var(--text2)}
.macro-row{display:flex;gap:8px}
.macro-pill{flex:1;background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center}
.macro-pill .val{font-size:18px;font-weight:700}
.macro-pill .lbl{font-size:11px;font-weight:600;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px}
.ing-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.ing-item:last-child{border-bottom:none}
.ing-name{font-size:14px;font-weight:600}
.ing-detail{font-size:12px;color:var(--text3);margin-top:2px}
.ing-kcal{font-size:14px;font-weight:700;color:var(--text2);white-space:nowrap;margin-left:12px}
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 14px}
.cal-nav-btn{background:var(--bg2);border:0.5px solid var(--border2);color:var(--text2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.cal-nav-btn:active{transform:scale(0.9);background:var(--bg3)}
.cal-month{font-size:17px;font-weight:700}
.cal-table{width:100%;border-collapse:collapse;padding:0 12px;table-layout:fixed}
.cal-table th{text-align:center;font-size:11px;color:var(--text3);font-weight:700;padding:4px 0;width:calc(100%/7)}
.cal-table td{text-align:center;padding:2px}
.cal-d{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:14px;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.15s;position:relative;-webkit-user-select:none;user-select:none}
.cal-d.empty{pointer-events:none}
.cal-d.today{background:var(--accent);color:#000;font-weight:700}
.cal-d.has-dot::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-d.today.has-dot::after{background:rgba(0,0,0,0.5)}
.cal-d.sel:not(.today){border:1.5px solid var(--accent);color:var(--accent);font-weight:700}
.cal-d:not(.empty):active{transform:scale(0.85)}
.activity-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.activity-card:active{transform:scale(0.97);background:var(--bg3)}
.act-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);background:var(--accentBg);border-radius:6px;padding:4px 10px;margin-bottom:10px}
.act-type-badge-hevy{color:var(--purple);background:rgba(191,90,242,0.12)}
.act-name{font-size:17px;font-weight:700;margin-bottom:12px}
.act-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--bg3);border-radius:var(--rs);padding:10px;text-align:center}
.stat-v{font-size:16px;font-weight:700;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.2px}
.report-body{padding:0 16px 40px;font-size:14px;line-height:1.8;color:var(--text2)}
.report-body h1{font-size:19px;font-weight:700;color:var(--text);margin:24px 0 10px}
.report-body h2{font-size:16px;font-weight:700;color:var(--accent);margin:20px 0 8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.report-body h3{font-size:15px;font-weight:700;color:var(--text);margin:16px 0 6px}
.report-body strong{color:var(--text);font-weight:700}
.report-body .bullet{display:flex;gap:8px;margin:6px 0;align-items:flex-start}
.report-body .bullet-dot{color:var(--accent);margin-top:3px;flex-shrink:0}
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 20px;color:var(--text2);font-size:14px;font-weight:500}
.spinner{width:38px;height:38px;border:2.5px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;padding:24px 20px 36px;width:100%;max-width:430px;border-top:0.5px solid var(--border2);max-height:85vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,0.5)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:14px}
.slabel{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase;padding:0 20px;margin:20px 0 10px}
.opt-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.opt-row:active{transform:scale(0.98);background:var(--bg3)}
.opt-row svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2.5;flex-shrink:0}
.choice-c{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.choice-c.sel{border-color:var(--accent);background:var(--accentBg)}
.choice-name{font-size:14px;font-weight:700}
.choice-macros{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.home-hero{padding:28px 20px 20px;display:flex;align-items:center;justify-content:space-between}
.settings-btn{width:40px;height:40px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.settings-btn:active{transform:scale(0.9)}
.settings-btn svg{width:20px;height:20px;stroke:var(--text2);fill:none;stroke-width:1.7}
.home-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:20px;margin:0 16px 14px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.home-card:active{transform:scale(0.97);background:var(--bg3)}
.hc-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hc-title{font-size:17px;font-weight:700}
.hc-sub{font-size:13px;color:var(--text2);margin-top:3px}
.hc-arrow svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2.5}
.step-row{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:14px;font-weight:700;margin-bottom:5px}
.step-desc{font-size:13px;color:var(--text2);line-height:1.6}
.step-link{color:var(--accent);text-decoration:none}
.img-upload{border:1.5px dashed var(--border2);border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;margin:0 16px 12px;transition:border-color 0.15s}
.img-upload .ico{font-size:30px;margin-bottom:8px}
.img-upload p{font-size:14px;color:var(--text2);font-weight:500}
.img-upload small{font-size:12px;color:var(--text3)}
.img-previews{display:flex;gap:8px;padding:0 16px;flex-wrap:wrap;margin-bottom:12px}
.img-prev{width:80px;height:80px;border-radius:var(--rs);object-fit:cover;border:0.5px solid var(--border2)}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.badge-g{background:var(--accentBg);color:var(--accent)}
.empty{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-ico{font-size:44px;opacity:0.35}
.empty-t{font-size:16px;font-weight:700;color:var(--text2)}
.empty-s{font-size:13px;color:var(--text3);max-width:240px}
.chart-wrap{position:relative;height:190px;width:190px;margin:0 auto}
.warn-banner{margin:0 16px 14px;background:rgba(255,214,10,0.08);border:0.5px solid rgba(255,214,10,0.2);border-radius:var(--r);padding:14px 16px}
.warn-title{font-size:14px;color:var(--amber);font-weight:700;margin-bottom:4px}
.warn-desc{font-size:13px;color:var(--text2);margin-bottom:10px}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;font-family:var(--font);pointer-events:none}
.food-log-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.food-log-item:active{transform:scale(0.98);background:var(--bg3)}
.fli-meal{font-size:15px;font-weight:700}
.fli-ingr{font-size:12px;color:var(--text3);margin-top:2px}
.fli-kcal{font-size:17px;font-weight:700;color:var(--accent);text-align:right}
.fli-macros{font-size:11px;color:var(--text3);margin-top:2px;text-align:right}
.rh-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 10px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.rh-item:active{transform:scale(0.98);background:var(--bg3)}
.rh-date{font-size:13px;color:var(--text3);font-weight:600;margin-bottom:5px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-on{background:var(--accent)}
input[type=number].inline-qty::-webkit-inner-spin-button, 
input[type=number].inline-qty::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number].inline-qty { -moz-appearance: textfield; }

/* Drag and Drop Ex-Card */
.ex-card {background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px;position:relative;transition:transform 0.1s, opacity 0.1s;}
.ex-card-title {font-weight:700;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.drag-handle {color:var(--text3);cursor:grab;padding:4px;touch-action:none}
.set-row {display:flex;gap:8px;margin-bottom:8px;align-items:center;font-size:13px}
.set-input {width:60px;padding:6px;text-align:center;font-size:13px}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div></div></div>
<nav id="nav">
  <div class="nav-item active" onclick="App.go('home')" data-n="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </div>
  <div class="nav-item" onclick="App.go('food')" data-n="food">
    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Comida
  </div>
  <div class="nav-item" onclick="App.go('workouts')" data-n="workouts">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5"><rect x="2" y="8" width="4" height="8" rx="1"/><rect x="18" y="8" width="4" height="8" rx="1"/><line x1="6" y1="12" x2="18" y2="12"/></svg>Entrenos
  </div>
  <div class="nav-item" onclick="App.go('daily', {resetDate: true})" data-n="daily">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Diario
  </div>
  <div class="nav-item" onclick="App.go('progress')" data-n="progress">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progreso
  </div>
</nav>
<script>
const dKey=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;};
const todayKey=()=>dKey(new Date());
const fmtDate=k=>{if(!k)return '';const[y,m,d]=k.split('-');const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return `${parseInt(d)} de ${mn[parseInt(m)-1]} de ${y}`;};
const fmtTime=s=>{if(isNaN(s)||s<=0)return '—'; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${h}h ${m}m`:`${m}m ${sec}s`;};
const fmtPace=mps=>{if(!mps||mps<=0)return'—'; const s=1000/mps;return `${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}/km`;};
const actE=t=>({'Run':'🏃','Ride':'🚴','Swim':'🏊','Walk':'🚶','Hike':'🥾','WeightTraining':'🏋️','Yoga':'🧘','Workout':'🏋️','VirtualRide':'🚴','Trail':'🏔️','Strength':'🏋️','Cardio':'🏃'}[t]||'🏅');
const actN=t=>({'Run':'Carrera','Ride':'Ciclismo','Swim':'Natación','Walk':'Caminata','Hike':'Senderismo','WeightTraining':'Musculación','Yoga':'Yoga','Workout':'Musculación','VirtualRide':'Ciclismo virtual','Trail':'Trail','Strength':'Musculación','Cardio':'Cardio'}[t]||t);
const mealE=m=>({'Desayuno':'☕','Almuerzo':'🥗','Merienda':'🍎','Cena':'🌙','Otro':'🍽️'}[m]||'🍽️');

const getObj = (key) => { try { const v = JSON.parse(localStorage.getItem(key)); return v && typeof v === 'object' && !Array.isArray(v) ? v : {}; } catch(e) { return {}; } };
const getArr = (key) => { try { const v = JSON.parse(localStorage.getItem(key)); return Array.isArray(v) ? v : []; } catch(e) { return []; } };

const EX_DB = {
  'Pecho': ['Press de banca plano', 'Press de banca inclinado', 'Aperturas con mancuernas', 'Cruce de cables en polea', 'Flexiones de pecho', 'Fondos en paralelas', 'Máquina contractora'],
  'Espalda': ['Dominadas', 'Dominadas supinas', 'Remo con barra', 'Remo gironda', 'Jalón al pecho', 'Remo con mancuerna a una mano', 'Peso muerto convencional', 'Pullover en polea alta'],

function toast(msg,type='ok'){
  const el=document.getElementById('toast');if(el)el.remove();
  const t=document.createElement('div');t.id='toast';
  t.innerHTML=`<div style="background:${type==='err'?'rgba(255,69,58,0.95)':'rgba(52,199,89,0.95)'};color:#fff;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.4)">${msg}</div>`;

const GEMINI=()=>S.geminiModel||'gemini-2.5-pro';
async function callGemini(parts,maxTok=4000,temp=0.1,isJson=false){
  const req = {
    contents:[{parts}],
    generationConfig:{temperature:temp,maxOutputTokens:maxTok}
  };
  if (isJson) {
     req.generationConfig.responseMimeType = "application/json";
  }
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI()}:generateContent?key=${S.geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(req)
  });
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.candidates[0].content.parts[0].text;
}

let tDragIdx = -1, tDragEl = null;
window.tDragStart = (e, i) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    tDragIdx = i;
    tDragEl = e.currentTarget.closest('.ex-card');
    tDragEl.style.opacity = '0.4';
    tDragEl.style.transform = 'scale(0.98)';
};
window.tDragMove = (e) => {
    if(!tDragEl) return;
    e.preventDefault(); 
};
window.tDragEnd = (e) => {
    if(!tDragEl) return;
    tDragEl.style.opacity = '1';
    tDragEl.style.transform = 'none';
    const touch = e.changedTouches ? e.changedTouches[0] : e; 
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetCard = target?.closest('.ex-card');
    if(targetCard && targetCard.dataset.idx !== undefined) {
        const targetIdx = parseInt(targetCard.dataset.idx);
        if(targetIdx !== tDragIdx && S.woState && S.woState.ex) {
            const arr = S.woState.ex;
            const item = arr.splice(tDragIdx, 1)[0];
            arr.splice(targetIdx, 0, item);
            App.render();
        }
    }
    tDragEl = null; tDragIdx = -1;
};

const App={
  getStreak() {
      let streak = 0;
      let d = new Date();
      
      const isValid = (dateStr) => {
          const logs = S.foodLogs[dateStr] || [];
          let hasA = false, hasC = false;
          for(let l of logs) {
              if(l.meal === 'Almuerzo') hasA = true;
              if(l.meal === 'Cena') hasC = true;
          }
          return hasA && hasC;
      };

      let k = dKey(d);
      if (isValid(k)) {
          streak++;
      }
      
      d.setDate(d.getDate() - 1);
      k = dKey(d);
      
      while(isValid(k)) {
          streak++;
          d.setDate(d.getDate() - 1);
          k = dKey(d);
      }
      return streak;
  },

  getReportRange(){
    const t = todayKey(), td = new Date();
    const rps = (S.weeklyReports || []).filter(r => r !== null && typeof r === 'object');
    let s = dKey(new Date(td.getTime()-6*86400000)), e = t;
    if(S.reportRange===0 && rps.length) {
      const le = rps[rps.length-1].weekEnd;
      if(le < t) {
        const [y,m,d] = le.split('-').map(Number);
        s = dKey(new Date(y, m-1, d+1));
      } else s = t;
    } else if(S.reportRange===2 && rps.length) {

  updateLogIngrAmount(ingrIdx, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const v = S.viewingLog;
    const log = S.foodLogs[v.k][v.i];
    const ing = log.ingredients[ingrIdx];
    const old = parseFloat(ing.amount);
    if(old === 0) return;
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    
    log.totals = log.ingredients.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});
    save();
    this.render();
  },

  updateSavedMealIngrAmount(ingrIdx, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const i = S.viewingSaved;
    const meal = S.savedMeals[i];
    const ing = meal.ingredients[ingrIdx];
    const old = parseFloat(ing.amount);
    if(old === 0) return;
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    
    meal.totals = meal.ingredients.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});

  async analyze(){
    const txt=document.getElementById('ftxt')?.value.trim();
    if(!txt){toast('Escribe algunos ingredientes','err');return;}
    
    S.draftFoodText = txt; 

    if (S.originalEditTxt && S.parsed && S.parsed.confirmed) {
       if (txt === S.originalEditTxt) {
           S.originalEditTxt = null;
           this.go('food-result');
           return;
       }
       
       const cleanStr = (s) => s.toLowerCase().replace(/[^a-z0-9ñáéíóú]/g, '');
       
       let newItems = txt.split('\n').map(s=>s.trim()).filter(Boolean);
       if (newItems.length === 1 && S.parsed.confirmed.length > 1) {
           newItems = txt.split(',').map(s=>s.trim()).filter(Boolean);
       }
       
       const oldItems = S.parsed.confirmed;
       
       if (newItems.length === oldItems.length) {
          let onlyQtyChanged = true;
          let newAmounts = [];
          
          for (let j = 0; j < oldItems.length; j++) {
             const old = oldItems[j];
             const match = newItems[j].match(/^([\d\.,]+)\s*(.*)$/);
             
             if (!match) { onlyQtyChanged = false; break; }
             
             const val = parseFloat(match[1].replace(',', '.'));
             const restClean = cleanStr(match[2]);
             const expectedClean = cleanStr(`${old.unit||''}${old.name||''}`);
             
             if (restClean !== expectedClean || isNaN(val) || val <= 0) {
                onlyQtyChanged = false; break;
             }
             newAmounts.push(val);
          }
          
          if (onlyQtyChanged) {
             for (let j = 0; j < oldItems.length; j++) {
                 const old = oldItems[j];
                 const val = newAmounts[j];
                 const ratio = val / old.amount;
                 old.amount = val;
                 old.kcal *= ratio;
                 old.protein *= ratio;
                 old.carbs *= ratio;
                 old.fat *= ratio;
                 if(old.fiber) old.fiber *= ratio;
             }
             this.calcTotals();
             S.originalEditTxt = null;
             this.go('food-result');
             return;
          }
       }
    }

    S.originalEditTxt = null;

    setHTML('<div class="loading"><div class="spinner"></div><div>Analizando...</div><div style="font-size:12px;color:var(--text3)">Calculando macros de cada ingrediente</div></div>');
    const prompt=`Eres un nutricionista experto en alimentos españoles (Mercadona, Lidl, Dia, Carrefour).
Analiza los ingredientes y calcula macros.

REGLAS:
- Ingrediente claro → "confirmed", macros para la cantidad TOTAL indicada
- Ingrediente ambiguo → "ambiguous", 2-3 opciones con macros POR 100G
- "2 yogures"≈250g, "1 plátano"≈120g, "1 huevo"≈60g
- Evita incluir saltos de línea ni comillas sin escapar en los valores de texto.

SOLO JSON ESTRICTO SIN MARKDOWN:
{"confirmed":[{"name":"nombre","amount":250,"unit":"g","kcal":170,"protein":20,"carbs":14,"fat":4,"fiber":0}],"ambiguous":[{"original":"texto","amount":40,"unit":"g","options":[{"name":"nombre","brand":"marca","kcal_per_100":380,"protein_per_100":12,"carbs_per_100":65,"fat_per_100":7,"description":"descripción breve"}]}]}

Ingredientes: ${txt}`;
    try{
      const raw=await callGemini([{text:prompt}], 4000, 0.1, true);
      let clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      clean = clean.replace(/,\s*([\]}])/g, '$1');
      const p=JSON.parse(clean);S.parsed=p;
      if(p.ambiguous?.length>0){S.pending=p.ambiguous;S.resolved={};S.inputSource='text';this.go('food-clarify');}
      else{S.inputSource='text';this.calcTotals();this.go('food-result');}
    }catch(e){
      setHTML(`<div class="loading"><div style="font-size:32px">⚠️</div><div style="color:var(--red);font-weight:600">Error al analizar</div><div style="font-size:13px;color:var(--text3);text-align:center;max-width:280px">${e.message}</div><div style="margin-top:20px"><button class="btn" onclick="App.go('food-input')" style="max-width:160px;font-size:14px">Volver</button></div></div>`);
    }
  },

  FoodClarify(){
    const allOk=S.pending.every((_,i)=>S.resolved[i]!==undefined);
    let html=`<div class="screen"><div class="header"><div class="h-back" onclick="App.go('food-input')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Atrás</div><div class="h-title">Confirmar</div><div style="width:60px"></div></div><div style="padding:4px 20px 20px;font-size:14px;color:var(--text2)">Elige la versión exacta de cada ingrediente:</div>`;
    S.pending.forEach((item,i)=>{
      const qty=item.amount?`(${item.amount}${item.unit})`:'';
      html+=`<div style="margin:0 16px 22px"><div style="font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:600">«${item.original}» ${qty}</div>`;
      item.options.forEach((opt,j)=>{
        const sel=S.resolved[i]===j,f=(item.amount||100)/100;
        html+=`<div class="choice-c ${sel?'sel':''}" onclick="App.pickChoice(${i},${j})"><div class="choice-name">${opt.name}${opt.brand?` <span style="color:var(--text3);font-weight:400">— ${opt.brand}</span>`:''}</div><div class="choice-macros">Por 100g: ${opt.kcal_per_100} kcal · P:${opt.protein_per_100}g · C:${opt.carbs_per_100}g · G:${opt.fat_per_100}g${opt.description?`<br><span style="color:var(--text3)">${opt.description}</span>`:''}</div>${item.amount?`<div style="margin-top:5px;font-size:12px;color:var(--accent);font-weight:600">Para ${item.amount}${item.unit}: ~${Math.round(opt.kcal_per_100*f)} kcal</div>`:''}</div>`;
      });
      html+=`</div>`;
    });
    html+=`<div style="padding:0 16px 28px"><button class="btn btn-accent" onclick="App.confirmChoices()" ${!allOk?'disabled':''}>Confirmar</button></div></div>`;
    return html;
  },
  pickChoice(i,j){S.resolved[i]=j;this.render();},
  confirmChoices(){
    S.pending.forEach((item,i)=>{const opt=item.options[S.resolved[i]],f=(item.amount||100)/100;
      S.parsed.confirmed.push({name:opt.name+(opt.brand?' — '+opt.brand:''),amount:item.amount||100,unit:item.unit||'g',kcal:Math.round(opt.kcal_per_100*f),protein:Math.round(opt.protein_per_100*f*10)/10,carbs:Math.round(opt.carbs_per_100*f*10)/10,fat:Math.round(opt.fat_per_100*f*10)/10,fiber:0});
    });
    this.calcTotals();
    S.inputSource='text';
    this.go('food-result');
  },
  
  updateIngrAmount(i, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const ing = S.parsed.confirmed[i];
    const old = parseFloat(ing.amount);
    if(old === 0) return; 
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    this.calcTotals();
    this.render();
  },
  
  calcTotals(){S.parsed.totals=S.parsed.confirmed.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});},

      </div>

  buildChart(){

    let t;
    if(S.view==='food-result' && S.parsed) t = S.parsed.totals;
    else if(S.view==='log-detail' && S.viewingLog) t = S.viewingLog.log.totals;
    else if(S.view==='saved-meal-detail' && S.viewingSaved!==null) t = S.savedMeals[S.viewingSaved].totals;
    if(!t) return;
    
    if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
    S.chartInst=new Chart(c,{type:'doughnut',data:{labels:['Proteína','Carbos','Grasa'],datasets:[{data:[t.protein*4,t.carbs*4,t.fat*9],backgroundColor:['#0a84ff','#ffd60a','#ff9f0a'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);return ` ${Math.round(ctx.parsed?ctx.parsed:ctx.raw/tot*100)}% (${Math.round(ctx.raw)} kcal)`;}}}}}}); 
  },
  showSaveModal(){document.getElementById('save-overlay').style.display='flex';setTimeout(()=>document.getElementById('meal-name')?.focus(),100);},
  
  saveMeal(){
    const name=document.getElementById('meal-name')?.value.trim();
    if(!name){toast('Escribe un nombre','err');return;}
    
    if (S.savedMeals.some((m, idx) => m.name.toLowerCase() === name.toLowerCase() && idx !== S.editingSavedMealIdx)) {
        toast('Ya existe una comida con ese nombre', 'err');
        return;
    }
    
    if (S.editingSavedMealIdx !== null && S.editingSavedMealIdx !== undefined) {
      S.savedMeals[S.editingSavedMealIdx] = {name,ingredients:S.parsed.confirmed,totals:S.parsed.totals,savedAt:new Date().toISOString()};
      S.editingSavedMealIdx = null;
    } else {
      S.savedMeals.push({name,ingredients:S.parsed.confirmed,totals:S.parsed.totals,savedAt:new Date().toISOString()});

    save();document.getElementById('save-overlay').style.display='none';toast('Comida guardada ✓');

      S.savedMeals[S.editingSavedMealIdx].ingredients = S.parsed.confirmed;
      S.savedMeals[S.editingSavedMealIdx].totals = S.parsed.totals;
      S.editingSavedMealIdx = null;
      save();
      toast('Comida guardada actualizada ✓');
      this.go('saved-meals', {nav:'food'});

        at: S.foodLogs[S.editTarget.k][S.editTarget.i].at || new Date().toISOString()
      };
      S.editTarget = null;
      save();
      toast('Comida actualizada ✓');
      this.go(S.nav === 'daily' ? 'daily' : 'food');

  // ── ENTRENAMIENTOS ──
  getRecentWorkouts(limit) {
    const all = [];
    Object.keys(S.stravaCache || {}).forEach(d => { const acts = S.stravaCache[d]; if(Array.isArray(acts)) acts.forEach(a => all.push({ date: d, time: new Date(a.start_date_local).getTime(), source: 'strava', data: a })) });
    Object.keys(S.hevyCache || {}).forEach(d => { const acts = S.hevyCache[d]; if(Array.isArray(acts)) acts.forEach(a => all.push({ date: d, time: new Date(a.start_time).getTime(), source: 'hevy', data: a })) });
    Object.keys(S.manualWorkouts || {}).forEach(d => { const acts = S.manualWorkouts[d]; if(Array.isArray(acts)) acts.forEach(a => all.push({ date: d, time: new Date(a.at).getTime(), source: 'manual', data: a })) });
    return all.sort((a,b) => b.time - a.time).slice(0, limit);
  },

  renderWorkoutCard(item, showDate = false) {
    const a = item.data;
    const src = item.source;
    let typeBadge = '', actName = '', statsHtml = '', extra = '', onclick = `App.showWorkoutDetail('${item.date}', '${a.id}', '${src}')`;
    const dateLabel = showDate ? `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">📅 ${fmtDate(item.date)}</div>` : '';

    const isStrength = a.type === 'Strength' || a.type === 'WeightTraining' || a.type === 'Workout';

    if (!isStrength && (src === 'strava' || src === 'manual')) {
       const dist = a.distance ? (a.distance/1000).toFixed(2)+' km' : '—';
       const time = a.moving_time ? fmtTime(a.moving_time) : (a.durationSeconds ? fmtTime(a.durationSeconds) : '—');
       const isRun = a.type==='Run' || a.type==='Walk' || a.type==='Ride' || a.type==='Hike' || a.type==='Cardio';
       const third = isRun && a.average_speed ? fmtPace(a.average_speed) : (a.average_heartrate ? Math.round(a.average_heartrate)+' bpm' : '—');
       const thirdLbl = isRun && a.average_speed ? 'Ritmo' : 'FC media';

       typeBadge = `<div class="act-type-badge">${actE(a.type)} ${actN(a.type)}</div>`;
       if (src === 'strava') typeBadge += `<span style="font-size:10px;color:var(--orange);margin-left:auto;font-weight:700;letter-spacing:0.5px">STRAVA</span>`;
       else typeBadge += `<span style="font-size:10px;color:var(--text3);margin-left:auto;font-weight:700;letter-spacing:0.5px">MANUAL</span>`;

       actName = a.name || 'Entrenamiento de Cardio';
       statsHtml = `<div class="stat-box"><div class="stat-v">${dist}</div><div class="stat-l">Distancia</div></div>
         <div class="stat-box"><div class="stat-v">${time}</div><div class="stat-l">Tiempo</div></div>
         <div class="stat-box"><div class="stat-v">${third}</div><div class="stat-l">${thirdLbl}</div></div>`;

       if(a.kilojoules) extra = `<div style="margin-top:10px;font-size:13px;color:var(--text2)">⚡ ${Math.round(a.kilojoules*0.239)} kcal</div>`;
    } else {
       const start = a.start_time ? new Date(a.start_time).getTime() : new Date(a.at || a.start_date_local).getTime();
       let end = null;
       if(a.end_time) end = new Date(a.end_time).getTime();
       else if(a.elapsed_time) end = start + (a.elapsed_time*1000);
       else if(a.durationSeconds) end = start + (a.durationSeconds*1000);
       else end = start; 

       const timeStr = (end-start)>0 ? fmtTime(Math.floor((end-start)/1000)) : (a.moving_time ? fmtTime(a.moving_time) : '—');
       const vol = a.volume_kg ? Math.round(a.volume_kg)+' kg' : '—';
       const pr = a.pr_count ? a.pr_count + ' PRs' : (a.exercises ? a.exercises.length + ' Ejs' : '—');

       typeBadge = `<div class="act-type-badge act-type-badge-hevy">🏋️ Musculación</div>`;

       else if (src === 'strava') typeBadge += `<span style="font-size:10px;color:var(--orange);margin-left:auto;font-weight:700;letter-spacing:0.5px">STRAVA</span>`;
       else typeBadge += `<span style="font-size:10px;color:var(--text3);margin-left:auto;font-weight:700;letter-spacing:0.5px">MANUAL</span>`;

       actName = a.name || a.title || 'Entrenamiento de fuerza';
       statsHtml = `
          <div class="stat-box"><div class="stat-v">${timeStr}</div><div class="stat-l">Tiempo</div></div>
          <div class="stat-box"><div class="stat-v">${vol}</div><div class="stat-l">Volumen</div></div>
          <div class="stat-box"><div class="stat-v">${pr}</div><div class="stat-l">${a.pr_count?'Récords':'Ejercicios'}</div></div>`;
    }

    return `<div class="activity-card" onclick="${onclick}">
       ${dateLabel}
       <div style="display:flex;align-items:center;margin-bottom:10px">${typeBadge}</div>
       <div class="act-name">${actName}</div>
       <div class="act-stats">${statsHtml}</div>
       ${extra}
    </div>`;
  },

  showWorkoutDetail(date, id, source) {
    let a = null;
    if(source === 'strava') a = (S.stravaCache[date]||[]).find(x => String(x.id) === String(id));
    else if(source === 'hevy') a = (S.hevyCache[date]||[]).find(x => String(x.id) === String(id));
    else if(source === 'manual') a = (S.manualWorkouts[date]||[]).find(x => String(x.id) === String(id));

    if(!a) return;

       this.showStrengthDetails(a, source, date);
    }

    details += `<div><span style="color:var(--text3)">Nombre del entreno:</span><br><strong style="font-size:16px">${a.name || 'Entrenamiento de Cardio'}</strong></div>`;

    if(a.description) details += `<div><span style="color:var(--text3)">Notas:</span><br><i>${a.description}</i></div>`;
    
    let gridInner = '';

    if(a.elapsed_time && a.elapsed_time !== a.moving_time) gridInner += `<div><span style="color:var(--text3);font-size:12px">Tiempo total</span><br><strong>${fmtTime(a.elapsed_time)}</strong></div>`;

    if(a.average_speed) gridInner += `<div><span style="color:var(--text3);font-size:12px">Vel. Media</span><br><strong>${(a.average_speed*3.6).toFixed(1)} km/h</strong></div>`;

    if(a.max_heartrate) gridInner += `<div><span style="color:var(--text3);font-size:12px">FC Máxima</span><br><strong style="color:var(--red)">❤️ ${Math.round(a.max_heartrate)} bpm</strong></div>`;

        <div style="margin-bottom:20px;max-height:65vh;overflow-y:auto;padding-right:4px">
          ${details}
        </div>
        <div style="display:flex;gap:10px">
           ${source === 'manual' ? `<button class="btn btn-ghost" style="flex:1;border:0.5px solid var(--border);color:var(--red)" onclick="App.deleteWorkout('${date}', '${a.id}', '${source}')"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : ''}
           <button class="btn btn-ghost" style="flex:2;border:0.5px solid var(--border)" onclick="App.saveWorkoutTemplate('${date}', '${a.id}', '${source}')"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg> Guardar</button>

        <div style="margin-bottom:20px;max-height:65vh;overflow-y:auto;padding-right:4px">
          ${details}

        <div style="display:flex;gap:10px">
           ${source === 'manual' ? `<button class="btn btn-ghost" style="flex:1;border:0.5px solid var(--border);color:var(--red)" onclick="App.deleteWorkout('${date}', '${a.id}', '${source}')"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : ''}
           <button class="btn btn-ghost" style="flex:2;border:0.5px solid var(--border)" onclick="App.saveWorkoutTemplate('${date}', '${a.id}', '${source}')"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg> Guardar</button>

  deleteWorkout(date, id, source) {
      if(source !== 'manual') return toast('Solo puedes borrar entrenos manuales', 'err');
      if(confirm('¿Seguro que quieres borrar este entrenamiento?')) {
          if(S.manualWorkouts[date]) {
              S.manualWorkouts[date] = S.manualWorkouts[date].filter(x => String(x.id) !== String(id));
              if(S.manualWorkouts[date].length === 0) delete S.manualWorkouts[date];
              save();
              document.getElementById('act-modal')?.remove();
              this.render();
              toast('Entrenamiento borrado ✓');
          }
      }
  },

  saveWorkoutTemplate(date, id, source) {
      const name = prompt('Dale un nombre a este entreno para guardarlo:');
      if(!name) return;
      
      if (S.savedWorkouts.some((w) => w.templateName.toLowerCase() === name.trim().toLowerCase())) {
          toast('Ya existe un entreno guardado con ese nombre', 'err');
          return;
      }

      let a = null;
      if(source === 'strava') a = S.stravaCache[date]?.find(x => String(x.id) === String(id));
      else if(source === 'hevy') a = S.hevyCache[date]?.find(x => String(x.id) === String(id));
      else if(source === 'manual') a = S.manualWorkouts[date]?.find(x => String(x.id) === String(id));
      
      if(!a) return;
      
      const template = JSON.parse(JSON.stringify(a));
      template.templateName = name.trim();
      template.templateId = Date.now().toString();
      
      const isStrength = template.type === 'WeightTraining' || template.type === 'Workout' || template.type === 'Strength' || source === 'hevy';
      if(isStrength) {
          template.type = 'Strength';
          template.durationSeconds = 0; 
      } else {
          template.type = template.type || 'Cardio';
      }

      S.savedWorkouts.push(template);
      save();
      document.getElementById('act-modal')?.remove();
      toast('Entreno guardado en favoritos ✓');
  },

  Workouts() {
    S.targetDate = todayKey(); 
    const list = this.getRecentWorkouts(10);
    let listHtml = list.length === 0 ? `<div class="empty"><div class="empty-ico">🏋️</div><div class="empty-t">Sin entrenamientos</div><div class="empty-s">No has registrado ni sincronizado nada aún.</div></div>` : list.map(item => this.renderWorkoutCard(item, true)).join('');

    return `<div class="screen">
      <div class="header"><div class="h-back" onclick="App.go('home')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Inicio</div><div class="h-title">Entrenamientos</div><div style="width:60px"></div></div>
      <div style="padding:12px 16px 16px; display:flex; gap:8px">
        <button class="btn btn-accent" style="flex:2" onclick="App.go('workout-type')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Registrar entreno</button>
        <button class="btn btn-ghost" style="flex:1; border:0.5px solid var(--border2)" onclick="App.go('saved-workouts', {intent:'manage'})">📂 Guardados</button>
      </div>
      <div class="slabel">Últimos 10 entrenamientos</div>
      <div style="margin-bottom:20px; padding-top:4px">
         ${listHtml}
      </div>
    </div>`;
  },

  SavedWorkouts() {
    const wks = S.savedWorkouts || [];
    let listHtml = wks.length === 0 ? `<div class="empty"><div class="empty-ico">📂</div><div class="empty-t">Sin entrenos guardados</div><div class="empty-s">Abre cualquier entreno y guárdalo como plantilla.</div></div>` : wks.map((t, i) => {
      let typeBadge = '';
      if(t.type === 'Strength') typeBadge = `<div class="act-type-badge act-type-badge-hevy">🏋️ Musculación</div>`;
      else typeBadge = `<div class="act-type-badge">${actE(t.type)} ${actN(t.type)}</div>`;

      return `<div class="activity-card" style="margin:0 0 12px 0" onclick="App.loadSavedWorkout(${i})">
         <div style="display:flex;align-items:center;margin-bottom:10px">
            ${typeBadge}
         </div>
         <div class="act-name" style="margin-bottom:0">${t.templateName}</div>
      </div>`;
    }).join('');
    
    const backTarget = S.intent === 'log' ? 'workout-type' : (S.nav === 'daily' ? 'daily' : 'workouts');

    return `<div class="screen">
      <div class="header"><div class="h-back" onclick="App.go('${backTarget}')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Atrás</div><div class="h-title">Guardados</div><div style="width:60px"></div></div>
      <div style="padding:16px">${listHtml}</div>
    </div>`;
  },

  loadSavedWorkout(idx) {
      const t = S.savedWorkouts[idx];
      const isStrength = t.type === 'Strength';
      const intent = S.intent || 'manage';
      S.workoutBackRoute = 'saved-workouts';
      
      const initState = JSON.stringify(t);
      
      if (isStrength) {
          S.woState = {
              isSaved: intent === 'manage', savedIdx: idx,
              type: 'Strength', step: 'editor', ex: t.exercises ? JSON.parse(JSON.stringify(t.exercises)) : [], filter: 'Todos', selEx: [],
              name: t.templateName, duration: '',
              orig: initState
          };
      } else {
          S.woState = {
              isSaved: intent === 'manage', savedIdx: idx,
              type: 'Cardio', step: 'editor', 
              cType: t.type || 'Run',
              cDist: t.distance ? (t.distance/1000).toString() : '', cTime: t.moving_time ? Math.round(t.moving_time/60).toString() : '', cPace: t.average_speed ? fmtPace(t.average_speed) : '', cElev: t.total_elevation_gain||'', cHr: t.average_heartrate||'', cKcal: t.kilojoules ? Math.round(t.kilojoules/0.239).toString() : '',
              name: t.templateName,
              orig: initState
          };
      }
      this.go('workout-input');
  },

  WorkoutType() {
    const isDaily = S.targetDate && S.targetDate !== todayKey();
    const backAction = isDaily ? "App.go('daily')" : "App.go('workouts')";

    return `<div class="screen">
      <div class="header"><div class="h-back" onclick="${backAction}"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Atrás</div><div class="h-title">Tipo de entreno</div><div style="width:60px"></div></div>
      <div style="padding:8px 20px 20px;font-size:15px;color:var(--text2)">Selecciona el tipo de entrenamiento</div>
      <div class="meal-grid">
        <div class="meal-card full" onclick="App.initWorkout('Strength')"><div class="meal-icon">🏋️</div><div class="meal-label">Fuerza</div><div style="font-size:12px;color:var(--text3);text-align:center">Series, repeticiones y pesos</div></div>
        <div class="meal-card full" onclick="App.initWorkout('Cardio')"><div class="meal-icon">🏃</div><div class="meal-label">Cardio</div><div style="font-size:12px;color:var(--text3);text-align:center">Distancia, tiempo y ritmos</div></div>
        <div class="meal-card full" onclick="App.go('saved-workouts', {intent:'log'})"><div class="meal-icon">📂</div><div class="meal-label">Entrenos Guardados</div><div style="font-size:12px;color:var(--text3);text-align:center">Usa una plantilla de tu historial</div></div>
      </div>
    </div>`;
  },

  initWorkout(type) {
     S.workoutBackRoute = 'workout-type';
     S.woState = {
         isSaved: false,
         type: type,
         step: type === 'Strength' ? 'editor' : 'editor',
         ex: [],
         filter: 'Todos',
         selEx: [],
         cType: 'Run', cDist: '', cTime: '', cPace: '', cElev: '', cHr: '', cKcal: '',
         name: '', duration: ''
     };
     this.go('workout-input');
  },

  WorkoutInput() {
    if(!S.woState) return this.WorkoutType();
    if(S.woState.type === 'Strength') return this.StrengthInput();
    return this.CardioInput();
  },

  editWoName() {
      const newName = prompt('Nombre del entreno:', S.woState.name || '');
      if(newName !== null && newName.trim() !== '') {
          S.woState.name = newName.trim();
          this.render();
      }
  },

  deleteSavedWo() {
      if(confirm('¿Seguro que quieres borrar este entreno guardado?')) {
          S.savedWorkouts.splice(S.woState.savedIdx, 1);
          save();
          toast('Entreno borrado');
          this.go('saved-workouts', {intent: 'manage'});
      }
  },

  updateSavedWo() {
      const ws = S.woState;
      let changed = false;
      const orig = S.savedWorkouts[ws.savedIdx];
      
      if(ws.name !== orig.templateName) changed = true;
      
      let finalD = 0, finalT = 0, finalSpeed = 0, finalElev = 0, finalHr = 0, finalKcal = 0;

      if(ws.type === 'Strength') {
          if(JSON.stringify(ws.ex) !== JSON.stringify(orig.exercises || [])) changed = true;
      } else {
          if(ws.cType !== orig.type) changed = true;
          
          let d = parseFloat(ws.cDist);
          let t = parseFloat(ws.cTime);
          let pMin = NaN;
          if(ws.cPace && ws.cPace.includes(':')) {
              const pts = ws.cPace.split(':');
              pMin = parseInt(pts[0]) + parseInt(pts[1])/60;
          } else if (ws.cPace) pMin = parseFloat(ws.cPace);

          if (isNaN(pMin) && !isNaN(d) && d > 0 && !isNaN(t) && t > 0) pMin = t / d;
          else if (isNaN(t) && !isNaN(d) && d > 0 && !isNaN(pMin) && pMin > 0) t = d * pMin;
          else if (isNaN(d) && !isNaN(t) && t > 0 && !isNaN(pMin) && pMin > 0) d = t / pMin;

          finalD = (d || 0) * 1000;
          finalT = (t || 0) * 60;
          if(pMin > 0) finalSpeed = 1000 / (pMin * 60);
          finalElev = parseFloat(ws.cElev) || 0;
          finalHr = parseFloat(ws.cHr) || 0;
          finalKcal = (parseFloat(ws.cKcal) / 0.239) || 0;

          if(Math.abs(finalD - (orig.distance||0)) > 1) changed = true;
          if(Math.abs(finalT - (orig.moving_time||0)) > 1) changed = true;
          if(Math.abs(finalElev - (orig.total_elevation_gain||0)) > 1) changed = true;
          if(Math.abs(finalHr - (orig.average_heartrate||0)) > 1) changed = true;
          if(Math.abs(finalKcal - (orig.kilojoules||0)) > 1) changed = true;
          if(Math.abs(finalSpeed - (orig.average_speed||0)) > 0.01) changed = true;
      }

      if(!changed) {
          toast('No hay cambios que guardar');
          return;
      }

      if(confirm('¿Seguro que quieres guardar los cambios en esta plantilla?')) {
          const idx = ws.savedIdx;
          if (S.savedWorkouts.some((w, i) => w.templateName.toLowerCase() === ws.name.toLowerCase() && i !== idx)) {
              toast('Ya existe un entreno guardado con ese nombre', 'err');
              return;
          }

          orig.templateName = ws.name;
          if(ws.type === 'Strength') {
              orig.exercises = JSON.parse(JSON.stringify(ws.ex));
              orig.durationSeconds = 0; 
          } else {
              orig.type = ws.cType;
              orig.distance = finalD;
              orig.moving_time = finalT;

  saveStrengthWorkout(fromSaved = false) {
     const ws = S.woState;
     let name = ws.name || 'Entrenamiento de fuerza';
     let timeStr = ws.duration;
     
     if(fromSaved || S.intent === 'log') {
         const t = prompt('Vas a registrar este entreno en el diario. ¿Cuántos minutos has tardado?');
         if(t === null || t.trim() === '') return;
         timeStr = t.trim();

         const nm = document.getElementById('woName')?.value.trim();
         if(nm) name = nm;
         timeStr = document.getElementById('woTime')?.value.trim() || '0';
     }

     const time = parseInt(timeStr) || 0;
     
     let vol = 0;
     ws.ex.forEach(ex => {
         ex.sets.forEach(s => {
             const w = parseFloat(s.weight)||0;
             const r = parseFloat(s.reps)||0;
             vol += (w * r);
         });
     });
     
     let atDate = new Date();
     if(S.targetDate && S.targetDate !== todayKey()) {
         const [y, m, d] = S.targetDate.split('-');
         atDate = new Date(y, m - 1, d, 12, 0, 0);
     }

     const wk = {
         id: Date.now().toString(),
         type: 'Strength',
         name: name,
         durationSeconds: time * 60,
         volume_kg: vol,
         exercises: ws.ex,
         at: atDate.toISOString()
     };

     const tk = S.targetDate || todayKey();
     if(!S.manualWorkouts) S.manualWorkouts = {};
     if(!S.manualWorkouts[tk]) S.manualWorkouts[tk] = [];
     S.manualWorkouts[tk].push(wk);
     save();
     toast('Entreno registrado ✓');
     this.go(S.nav === 'daily' ? 'daily' : 'workouts');
