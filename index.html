<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111112">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111112;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f5f5f5;--text2:#aeaeb2;--text3:#636366;
  --accent:#34c759;--accent2:#2da847;--accentBg:rgba(52,199,89,0.12);
  --red:#ff453a;--amber:#ffd60a;--blue:#0a84ff;--purple:#bf5af2;--orange:#ff9f0a;
  --r:14px;--rs:10px;--rl:20px;--font:'Plus Jakarta Sans',sans-serif;--nav:64px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:var(--nav)}
#app::-webkit-scrollbar{display:none}
#app{scrollbar-width:none}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav);background:rgba(17,17,18,0.9);backdrop-filter:blur(20px);border-top:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 5px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;padding:8px 10px;transition:color 0.15s;-webkit-user-select:none;user-select:none;flex:1}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:transform 0.15s}
.nav-item.active{color:var(--accent)}
.nav-item.active svg{transform:scale(1.1)}
.screen{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(17,17,18,0.95);backdrop-filter:blur(10px);z-index:10;border-bottom:0.5px solid var(--border)}
.h-back{display:flex;align-items:center;gap:4px;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;padding:4px 0;min-width:60px}
.h-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2}
.h-title{font-size:17px;font-weight:700;text-align:center}
.h-action{min-width:60px;display:flex;justify-content:flex-end}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.icon-btn:active{transform:scale(0.9)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.card-lg{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:20px;margin:0 16px 16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;border-radius:var(--r);padding:14px 20px;cursor:pointer;width:100%;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.97);opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);border-color:var(--accent2);color:#000}
.btn-accent:active{background:var(--accent2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-danger{background:rgba(255,69,58,0.1);border-color:rgba(255,69,58,0.2);color:var(--red)}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2}
input,textarea{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);font-family:var(--font);font-size:15px;border-radius:var(--rs);padding:13px 14px;width:100%;outline:none;transition:border-color 0.15s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:none;line-height:1.6}
::placeholder{color:var(--text3)}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;margin:0 16px 16px;gap:3px}
.tab{flex:1;text-align:center;padding:9px 6px;font-size:13px;font-weight:600;color:var(--text3);border-radius:var(--rs);cursor:pointer;transition:all 0.2s;-webkit-user-select:none;user-select:none;white-space:nowrap}
.tab.active{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2)}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.meal-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.meal-card:active{transform:scale(0.94);background:var(--bg3)}
.meal-card.full{grid-column:span 2;flex-direction:row;justify-content:center}
.meal-icon{font-size:34px}
.meal-label{font-size:14px;font-weight:700;color:var(--text2)}
.macro-row{display:flex;gap:8px}
.macro-pill{flex:1;background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center}
.macro-pill .val{font-size:18px;font-weight:700}
.macro-pill .lbl{font-size:11px;font-weight:600;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.3px}
.ing-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.ing-item:last-child{border-bottom:none}
.ing-name{font-size:14px;font-weight:600}
.ing-detail{font-size:12px;color:var(--text3);margin-top:2px}
.ing-kcal{font-size:14px;font-weight:700;color:var(--text2);white-space:nowrap;margin-left:12px}
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 14px}
.cal-nav-btn{background:var(--bg2);border:0.5px solid var(--border2);color:var(--text2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.cal-nav-btn:active{transform:scale(0.9);background:var(--bg3)}
.cal-month{font-size:17px;font-weight:700}
.cal-table{width:100%;border-collapse:collapse;padding:0 12px;table-layout:fixed}
.cal-table th{text-align:center;font-size:11px;color:var(--text3);font-weight:700;padding:4px 0;width:calc(100%/7)}
.cal-table td{text-align:center;padding:2px}
.cal-d{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:14px;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.15s;position:relative;-webkit-user-select:none;user-select:none}
.cal-d.empty{pointer-events:none}
.cal-d.today{background:var(--accent);color:#000;font-weight:700}
.cal-d.has-dot::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-d.today.has-dot::after{background:rgba(0,0,0,0.5)}
.cal-d.sel:not(.today){border:1.5px solid var(--accent);color:var(--accent);font-weight:700}
.cal-d:not(.empty):active{transform:scale(0.85)}
.activity-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.activity-card:active{transform:scale(0.97);background:var(--bg3)}
.act-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);background:var(--accentBg);border-radius:6px;padding:4px 10px;margin-bottom:10px}
.act-type-badge-hevy{color:var(--purple);background:rgba(191,90,242,0.12)}
.act-name{font-size:17px;font-weight:700;margin-bottom:12px}
.act-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(--bg3);border-radius:var(--rs);padding:10px;text-align:center}
.stat-v{font-size:16px;font-weight:700;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.2px}
.report-body{padding:0 16px 40px;font-size:14px;line-height:1.8;color:var(--text2)}
.report-body h1{font-size:19px;font-weight:700;color:var(--text);margin:24px 0 10px}
.report-body h2{font-size:16px;font-weight:700;color:var(--accent);margin:20px 0 8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.report-body h3{font-size:15px;font-weight:700;color:var(--text);margin:16px 0 6px}
.report-body strong{color:var(--text);font-weight:700}
.report-body .bullet{display:flex;gap:8px;margin:6px 0;align-items:flex-start}
.report-body .bullet-dot{color:var(--accent);margin-top:3px;flex-shrink:0}
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 20px;color:var(--text2);font-size:14px;font-weight:500}
.spinner{width:38px;height:38px;border:2.5px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;padding:24px 20px 36px;width:100%;max-width:430px;border-top:0.5px solid var(--border2);max-height:85vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,0.5)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:14px}
.slabel{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase;padding:0 20px;margin:20px 0 10px}
.opt-row{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.opt-row:active{transform:scale(0.98);background:var(--bg3)}
.opt-row svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2.5;flex-shrink:0}
.choice-c{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.choice-c.sel{border-color:var(--accent);background:var(--accentBg)}
.choice-name{font-size:14px;font-weight:700}
.choice-macros{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.home-hero{padding:28px 20px 20px;display:flex;align-items:center;justify-content:space-between}
.settings-btn{width:40px;height:40px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.settings-btn:active{transform:scale(0.9)}
.settings-btn svg{width:20px;height:20px;stroke:var(--text2);fill:none;stroke-width:1.7}
.home-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:20px;margin:0 16px 14px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.home-card:active{transform:scale(0.97);background:var(--bg3)}
.hc-icon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hc-title{font-size:17px;font-weight:700}
.hc-sub{font-size:13px;color:var(--text2);margin-top:3px}
.hc-arrow svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2.5}
.step-row{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:14px;font-weight:700;margin-bottom:5px}
.step-desc{font-size:13px;color:var(--text2);line-height:1.6}
.step-link{color:var(--accent);text-decoration:none}
.img-upload{border:1.5px dashed var(--border2);border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;margin:0 16px 12px;transition:border-color 0.15s}
.img-upload .ico{font-size:30px;margin-bottom:8px}
.img-upload p{font-size:14px;color:var(--text2);font-weight:500}
.img-upload small{font-size:12px;color:var(--text3)}
.img-previews{display:flex;gap:8px;padding:0 16px;flex-wrap:wrap;margin-bottom:12px}
.img-prev{width:80px;height:80px;border-radius:var(--rs);object-fit:cover;border:0.5px solid var(--border2)}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.badge-g{background:var(--accentBg);color:var(--accent)}
.empty{text-align:center;padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-ico{font-size:44px;opacity:0.35}
.empty-t{font-size:16px;font-weight:700;color:var(--text2)}
.empty-s{font-size:13px;color:var(--text3);max-width:240px}
.chart-wrap{position:relative;height:190px;width:190px;margin:0 auto}
.warn-banner{margin:0 16px 14px;background:rgba(255,214,10,0.08);border:0.5px solid rgba(255,214,10,0.2);border-radius:var(--r);padding:14px 16px}
.warn-title{font-size:14px;color:var(--amber);font-weight:700;margin-bottom:4px}
.warn-desc{font-size:13px;color:var(--text2);margin-bottom:10px}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;font-family:var(--font);pointer-events:none}
.food-log-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:0 16px 10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.food-log-item:active{transform:scale(0.98);background:var(--bg3)}
.fli-meal{font-size:15px;font-weight:700}
.fli-ingr{font-size:12px;color:var(--text3);margin-top:2px}
.fli-kcal{font-size:17px;font-weight:700;color:var(--accent);text-align:right}
.fli-macros{font-size:11px;color:var(--text3);margin-top:2px;text-align:right}
.rh-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 10px;cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none}
.rh-item:active{transform:scale(0.98);background:var(--bg3)}
.rh-date{font-size:13px;color:var(--text3);font-weight:600;margin-bottom:5px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-on{background:var(--accent)}
/* Input edit inline */
input[type=number].inline-qty::-webkit-inner-spin-button, 
input[type=number].inline-qty::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number].inline-qty { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div></div></div>
<nav id="nav">
  <div class="nav-item active" onclick="App.go('home')" data-n="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </div>
  <div class="nav-item" onclick="App.go('food')" data-n="food">
    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Comida
  </div>
  <div class="nav-item" onclick="App.go('daily')" data-n="daily">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Diario
  </div>
  <div class="nav-item" onclick="App.go('progress')" data-n="progress">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progreso
  </div>
</nav>
<script>
const dKey=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;};
const todayKey=()=>dKey(new Date());
const fmtDate=k=>{if(!k)return '';const[y,m,d]=k.split('-');const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return `${parseInt(d)} de ${mn[parseInt(m)-1]} de ${y}`;};
const fmtTime=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${h}h ${m}m`:`${m}m ${sec}s`;};
const fmtPace=mps=>{if(!mps)return'—'; const s=1000/mps;return `${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}/km`;};
const actE=t=>({'Run':'🏃','Ride':'🚴','Swim':'🏊','Walk':'🚶','Hike':'🥾','WeightTraining':'🏋️','Yoga':'🧘','Workout':'💪','VirtualRide':'🚴','Trail':'🏔️'}[t]||'🏅');
const actN=t=>({'Run':'Carrera','Ride':'Ciclismo','Swim':'Natación','Walk':'Caminata','Hike':'Senderismo','WeightTraining':'Musculación','Yoga':'Yoga','Workout':'Entrenamiento','VirtualRide':'Ciclismo virtual','Trail':'Trail'}[t]||t);
const mealE=m=>({'Desayuno':'☕','Almuerzo':'🥗','Merienda':'🍎','Cena':'🌙','Otro':'🍽️'}[m]||'🍽️');

const S={
  geminiKey:localStorage.getItem('ft_gk')||'',
  geminiModel:localStorage.getItem('ft_gm')||'gemini-2.5-pro',
  stravaClientId:localStorage.getItem('ft_sci')||'',
  stravaClientSecret:localStorage.getItem('ft_scs')||'',
  stravaAccessToken:localStorage.getItem('ft_sat')||'',
  stravaRefreshToken:localStorage.getItem('ft_srt')||'',
  stravaTokenExpiry:parseInt(localStorage.getItem('ft_ste'))||0,
  hevyApiKey:localStorage.getItem('ft_hak')||'',
  savedMeals:JSON.parse(localStorage.getItem('ft_meals')||'[]'),
  foodLogs:JSON.parse(localStorage.getItem('ft_logs')||'{}'),
  weeklyReports:JSON.parse(localStorage.getItem('ft_reports')||'[]'),
  userHeight: localStorage.getItem('ft_h')||'',
  bodyMetrics: JSON.parse(localStorage.getItem('ft_metrics')||'[]'),
  stravaCache:JSON.parse(localStorage.getItem('ft_sc')||'{}'),
  hevyCache:JSON.parse(localStorage.getItem('ft_hc')||'{}'),
  view:'home',mealType:null,foodTab:0,parsed:null,pending:[],resolved:{},
  weekImages:[],weekGoal:'',viewingReport:null,
  calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),
  dailyDate:todayKey(),chartInst:null, progChartInst1:null, progChartInst2:null, dailyChartInst:null, 
  reportRange: 1, viewingLog: null, viewingSaved: null, editTarget: null, backRoute: 'food-type',
  progReportTab: 0, originalEditTxt: null, draftFoodText: ''
};

const save=()=>{
  ['gk','gm','sci','scs','sat','srt','ste','h','hak'].forEach((k,i)=>localStorage.setItem('ft_'+k,[S.geminiKey,S.geminiModel,S.stravaClientId,S.stravaClientSecret,S.stravaAccessToken,S.stravaRefreshToken,S.stravaTokenExpiry,S.userHeight,S.hevyApiKey][i]));
  localStorage.setItem('ft_meals',JSON.stringify(S.savedMeals));
  localStorage.setItem('ft_logs',JSON.stringify(S.foodLogs));
  localStorage.setItem('ft_reports',JSON.stringify(S.weeklyReports));
  localStorage.setItem('ft_metrics',JSON.stringify(S.bodyMetrics));
  localStorage.setItem('ft_sc',JSON.stringify(S.stravaCache));
  localStorage.setItem('ft_hc',JSON.stringify(S.hevyCache));
};

function toast(msg,type='ok'){
  const el=document.getElementById('toast');if(el)el.remove();
  const t=document.createElement('div');t.id='toast';
  t.innerHTML=`<div style="background:${type==='err'?'rgba(255,69,58,0.95)':'rgba(52,199,89,0.95)'};color:#fff;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,0.4)">${msg}</div>`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
const setHTML=html=>{const a=document.getElementById('app');a.innerHTML=html;a.scrollTop=0;};

const GEMINI=()=>S.geminiModel||'gemini-2.5-pro';
async function callGemini(parts,maxTok=4000,temp=0.1){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI()}:generateContent?key=${S.geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:temp,maxOutputTokens:maxTok}})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.candidates[0].content.parts[0].text;
}

  async syncStrava(){
    if(!S.stravaAccessToken)return;
    const ok=await this.refreshStrava();if(!ok)return;
    try{
      const r=await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=100',{headers:{Authorization:`Bearer ${S.stravaAccessToken}`}});
      const acts=await r.json();
      if(Array.isArray(acts)){
        acts.forEach(a=>{
          const k=dKey(new Date(a.start_date_local));
          if(!S.stravaCache[k])S.stravaCache[k]=[];
          if(!S.stravaCache[k].find(x=>x.id===a.id)) S.stravaCache[k].push(a);
        });
        const td=new Date();
        for(let i=0;i<60;i++){
          const d=new Date(td);d.setDate(d.getDate()-i);const k=dKey(d);
          if(!S.stravaCache[k])S.stravaCache[k]=[];
        }
        save();
        if(['home','daily','progress','weekly-gen'].includes(S.view)) this.render();
      }
    }catch(e){}
  },

  async syncHevy(){
    if(!S.hevyApiKey)return;
    try{
      const r=await fetch('https://api.hevyapp.com/v1/workouts?page=1&pageSize=100',{headers:{'x-api-key':S.hevyApiKey}});
      const d=await r.json();
      if(d.workouts){
        d.workouts.forEach(w=>{
          const k=dKey(new Date(w.start_time));
          if(!S.hevyCache[k])S.hevyCache[k]=[];
          if(!S.hevyCache[k].find(x=>x.id===w.id)) S.hevyCache[k].push(w);
        });
        save();
        if(['home','daily','progress','weekly-gen'].includes(S.view)) this.render();
      }
    }catch(e){}
  },

  getReportRange(){
    const t = todayKey(), td = new Date();
    const rps = S.weeklyReports;
    let s = dKey(new Date(td.getTime()-6*86400000)), e = t;
    if(S.reportRange===0 && rps.length) {
      const le = rps[rps.length-1].weekEnd;
      if(le < t) {
        const [y,m,d] = le.split('-').map(Number);
        s = dKey(new Date(y, m-1, d+1));
      } else s = t;
    } else if(S.reportRange===2 && rps.length) {
      s = rps[0].weekStart;
    }
    return {s, e};
  },

  setModel(m){S.geminiModel=m;save();this.render();},
  saveGemini(){S.geminiKey=document.getElementById('gkey').value.trim();save();toast('Ajustes guardados ✓');},

  disconnectHevy(){ S.hevyApiKey=''; S.hevyCache={}; save(); this.render(); },

  openStravaAuth(){const cid=document.getElementById('scid')?.value.trim();if(!cid){toast('Introduce el Client ID','err');return;}window.open(`https://www.strava.com/oauth/authorize?client_id=${cid}&response_type=code&redirect_uri=http://localhost&approval_prompt=force&scope=activity:read_all`,'_blank');},
  async connectStrava(){
    const cid=document.getElementById('scid')?.value.trim(),csc=document.getElementById('scsc')?.value.trim(),code=document.getElementById('scode')?.value.trim();
    if(!cid||!csc||!code){toast('Completa todos los campos','err');return;}
    S.stravaClientId=cid;S.stravaClientSecret=csc;
    try{const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:cid,client_secret:csc,code,grant_type:'authorization_code'})});const d=await r.json();
      if(d.access_token){S.stravaAccessToken=d.access_token;S.stravaRefreshToken=d.refresh_token;S.stravaTokenExpiry=d.expires_at;save();toast('¡Strava conectado! ✓');this.syncStrava();this.go('settings');}else toast('Error: '+(d.message||'Código inválido'),'err');
    }catch(e){toast('Error de conexión','err');}
  },
  disconnectStrava(){S.stravaAccessToken='';S.stravaRefreshToken='';S.stravaTokenExpiry=0;S.stravaCache={};save();this.go('settings');},
  async refreshStrava(){
    if(Date.now()/1000<S.stravaTokenExpiry-60)return true;if(!S.stravaRefreshToken)return false;
    try{const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:S.stravaClientId,client_secret:S.stravaClientSecret,refresh_token:S.stravaRefreshToken,grant_type:'refresh_token'})});const d=await r.json();
      if(d.access_token){S.stravaAccessToken=d.access_token;S.stravaRefreshToken=d.refresh_token;S.stravaTokenExpiry=d.expires_at;save();return true;}
    }catch(e){}return false;
  },

  updateLogIngrAmount(ingrIdx, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const v = S.viewingLog;
    const log = S.foodLogs[v.k][v.i];
    const ing = log.ingredients[ingrIdx];
    const old = parseFloat(ing.amount);
    if(old === 0) return;
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    
    log.totals = log.ingredients.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});
    save();
    this.render();
  },

  updateSavedMealIngrAmount(ingrIdx, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const i = S.viewingSaved;
    const meal = S.savedMeals[i];
    const ing = meal.ingredients[ingrIdx];
    const old = parseFloat(ing.amount);
    if(old === 0) return;
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    
    meal.totals = meal.ingredients.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});
    save();
    this.render();
  },

  deleteLogDetail() {
     if(confirm('¿Seguro que quieres eliminar esta comida del registro?')){
        S.foodLogs[S.viewingLog.k].splice(S.viewingLog.i, 1);

  async analyze(){
    const txt=document.getElementById('ftxt')?.value.trim();
    if(!txt){toast('Escribe algunos ingredientes','err');return;}
    
    S.draftFoodText = txt; 

    if (S.originalEditTxt && S.parsed && S.parsed.confirmed) {
       if (txt === S.originalEditTxt) {
           S.originalEditTxt = null;
           this.go('food-result');
           return;
       }
       
       const cleanStr = (s) => s.toLowerCase().replace(/[^a-z0-9ñáéíóú]/g, '');
       
       let newItems = txt.split('\n').map(s=>s.trim()).filter(Boolean);
       if (newItems.length === 1 && S.parsed.confirmed.length > 1) {
           newItems = txt.split(',').map(s=>s.trim()).filter(Boolean);
       }
       
       const oldItems = S.parsed.confirmed;
       
       if (newItems.length === oldItems.length) {
          let onlyQtyChanged = true;
          let newAmounts = [];
          
          for (let j = 0; j < oldItems.length; j++) {
             const old = oldItems[j];
             const match = newItems[j].match(/^([\d\.,]+)\s*(.*)$/);
             
             if (!match) { onlyQtyChanged = false; break; }
             
             const val = parseFloat(match[1].replace(',', '.'));
             const restClean = cleanStr(match[2]);
             const expectedClean = cleanStr(`${old.unit||''}${old.name||''}`);
             
             if (restClean !== expectedClean || isNaN(val) || val <= 0) {
                onlyQtyChanged = false; break;
             }
             newAmounts.push(val);
          }
          
          if (onlyQtyChanged) {
             for (let j = 0; j < oldItems.length; j++) {
                const old = oldItems[j];
                const val = newAmounts[j];
                const oldAmt = parseFloat(old.amount);
                
                if (oldAmt > 0 && val !== oldAmt) {
                   const ratio = val / oldAmt;
                   old.amount = val;
                   old.kcal *= ratio;
                   old.protein *= ratio;
                   old.carbs *= ratio;
                   old.fat *= ratio;
                   if(old.fiber) old.fiber *= ratio;
                }
             }
             this.calcTotals();
             S.originalEditTxt = null;
             this.go('food-result');
             return;
          }
       }
    }

    S.originalEditTxt = null;

    setHTML('<div class="loading"><div class="spinner"></div><div>Analizando...</div><div style="font-size:12px;color:var(--text3)">Calculando macros de cada ingrediente</div></div>');
    const prompt=`Eres un nutricionista experto en alimentos españoles (Mercadona, Lidl, Dia, Carrefour).
Analiza los ingredientes y calcula macros.

REGLAS:
- Ingrediente claro → "confirmed", macros para la cantidad TOTAL indicada
- Ingrediente ambiguo → "ambiguous", 2-3 opciones con macros POR 100G
- "2 yogures"≈250g, "1 plátano"≈120g, "1 huevo"≈60g

SOLO JSON SIN MARKDOWN:
{"confirmed":[{"name":"nombre","amount":250,"unit":"g","kcal":170,"protein":20,"carbs":14,"fat":4,"fiber":0}],"ambiguous":[{"original":"texto","amount":40,"unit":"g","options":[{"name":"nombre","brand":"marca","kcal_per_100":380,"protein_per_100":12,"carbs_per_100":65,"fat_per_100":7,"description":"descripción breve"}]}]}

Ingredientes: ${txt}`;
    try{
      const raw=await callGemini([{text:prompt}]);
      const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      const p=JSON.parse(clean);S.parsed=p;
      if(p.ambiguous?.length>0){S.pending=p.ambiguous;S.resolved={};this.go('food-clarify');}
      else{this.calcTotals();this.go('food-result');}
    }catch(e){
      setHTML(`<div class="loading"><div style="font-size:32px">⚠️</div><div style="color:var(--red);font-weight:600">Error al analizar</div><div style="font-size:13px;color:var(--text3);text-align:center;max-width:280px">${e.message}</div><div style="margin-top:20px"><button class="btn" onclick="App.go('food-input')" style="max-width:160px;font-size:14px">Volver</button></div></div>`);
    }
  },

  FoodClarify(){
    const allOk=S.pending.every((_,i)=>S.resolved[i]!==undefined);
    let html=`<div class="screen"><div class="header"><div class="h-back" onclick="App.go('food-input')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Atrás</div><div class="h-title">Confirmar</div><div style="width:60px"></div></div><div style="padding:4px 20px 20px;font-size:14px;color:var(--text2)">Elige la versión exacta de cada ingrediente:</div>`;
    S.pending.forEach((item,i)=>{
      const qty=item.amount?`(${item.amount}${item.unit})`:'';
      html+=`<div style="margin:0 16px 22px"><div style="font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:600">«${item.original}» ${qty}</div>`;
      item.options.forEach((opt,j)=>{
        const sel=S.resolved[i]===j,f=(item.amount||100)/100;
        html+=`<div class="choice-c ${sel?'sel':''}" onclick="App.pickChoice(${i},${j})"><div class="choice-name">${opt.name}${opt.brand?` <span style="color:var(--text3);font-weight:400">— ${opt.brand}</span>`:''}</div><div class="choice-macros">Por 100g: ${opt.kcal_per_100} kcal · P:${opt.protein_per_100}g · C:${opt.carbs_per_100}g · G:${opt.fat_per_100}g${opt.description?`<br><span style="color:var(--text3)">${opt.description}</span>`:''}</div>${item.amount?`<div style="margin-top:5px;font-size:12px;color:var(--accent);font-weight:600">Para ${item.amount}${item.unit}: ~${Math.round(opt.kcal_per_100*f)} kcal</div>`:''}</div>`;
      });
      html+=`</div>`;
    });
    html+=`<div style="padding:0 16px 28px"><button class="btn btn-accent" onclick="App.confirmChoices()" ${!allOk?'disabled':''}>Confirmar</button></div></div>`;
    return html;
  },
  pickChoice(i,j){S.resolved[i]=j;this.render();},
  confirmChoices(){
    S.pending.forEach((item,i)=>{const opt=item.options[S.resolved[i]],f=(item.amount||100)/100;
      S.parsed.confirmed.push({name:opt.name+(opt.brand?' — '+opt.brand:''),amount:item.amount||100,unit:item.unit||'g',kcal:Math.round(opt.kcal_per_100*f),protein:Math.round(opt.protein_per_100*f*10)/10,carbs:Math.round(opt.carbs_per_100*f*10)/10,fat:Math.round(opt.fat_per_100*f*10)/10,fiber:0});
    });
    this.calcTotals();this.go('food-result');
  },
  
  updateIngrAmount(i, val){
    val = parseFloat(val);
    if(isNaN(val) || val <= 0) return;
    const ing = S.parsed.confirmed[i];
    const old = parseFloat(ing.amount);
    if(old === 0) return; 
    const ratio = val / old;
    ing.amount = val;
    ing.kcal *= ratio;
    ing.protein *= ratio;
    ing.carbs *= ratio;
    ing.fat *= ratio;
    if(ing.fiber) ing.fiber *= ratio;
    this.calcTotals();
    this.render();
  },
  
  calcTotals(){S.parsed.totals=S.parsed.confirmed.reduce((a,x)=>({kcal:a.kcal+(x.kcal||0),protein:a.protein+(x.protein||0),carbs:a.carbs+(x.carbs||0),fat:a.fat+(x.fat||0),fiber:a.fiber+(x.fiber||0)}),{kcal:0,protein:0,carbs:0,fat:0,fiber:0});},

    S.backRoute = 'food-result';
    S.originalEditTxt = text;
    S.draftFoodText = text;
    this.go('food-input', {nav:'food'});
  },

      <div style="padding:0 16px;margin-bottom:16px"><div class="macro-row">

        <div class="macro-pill"><div class="val" style="color:var(--orange)">${Math.round(t.fat)}g</div><div class="lbl">Grasa</div></div>
        ${t.fiber>0?`<div class="macro-pill"><div class="val" style="color:var(--purple)">${Math.round(t.fiber)}g</div><div class="lbl">Fibra</div></div>`:''}

                <span style="padding-right:6px;font-size:12px;color:var(--text3)">${x.unit}</span>

  buildChart(){

      };

  // ── PROGRESO E INFORMES UNIFICADOS ──
  Progress(){

    const fats = S.bodyMetrics.filter(m => m.fat).map(m => m.fat);

         </div>
         <div>
            <div style="font-size:12px;color:var(--text3)">Peso</div>
            <div style="font-size:18px;font-weight:700;color:var(--text);margin:4px 0">${curW}</div>
         </div>
         <div>
            <div style="font-size:12px;color:var(--text3)">Grasa</div>
            <div style="font-size:18px;font-weight:700;color:var(--text);margin:4px 0">${curF}</div>
         </div>
      </div>

      <div class="slabel">Análisis IA</div>
      <div class="tabs" style="margin:0 16px 12px">
        <div class="tab ${repTab===0?'active':''}" onclick="App.setProgReportTab(0)">✨ Generar Informe</div>
        <div class="tab ${repTab===1?'active':''}" onclick="App.setProgReportTab(1)">🕒 Historial</div>
      </div>

      ${repTab === 0 ? `
        <div class="card" style="text-align:center; padding:24px 16px;">
          <div style="font-size:36px; margin-bottom:12px">🤖</div>
          <div style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:8px">Genera un nuevo análisis</div>
          <div style="font-size:13px; color:var(--text2); margin-bottom:16px">Obtén un resumen evaluando entrenamientos, macros y constancia.</div>
          <button class="btn btn-accent" onclick="App.go('weekly-gen', {nav:'progress'})">Generar Informe</button>
        </div>
      ` : `
        <div style="margin:0 0 16px 0;">
          ${rps.length === 0 ? 
            `<div class="empty"><div class="empty-ico">📄</div><div class="empty-t">Sin historial</div><div class="empty-s">Aún no has generado ningún informe.</div></div>` :
            rps.slice().reverse().map((r, idx) => {

                <div style="flex:1" onclick="App.openReport(${realIdx})">

              </div>`;

      <div class="slabel" style="display:flex;justify-content:space-between;align-items:center;margin-top:24px"><span>Evolución de Peso</span>${wDiffStr}</div>
      <div class="card" style="position:relative;height:180px;padding:10px;margin-bottom:16px">
          ${S.bodyMetrics.length > 0 ? `<canvas id="weightChart"></canvas>` : `<div class="empty" style="padding:20px 10px"><div class="empty-ico">📉</div><div class="empty-s">Añade tu peso al generar un informe.</div></div>`}
      </div>

      <div class="slabel" style="display:flex;justify-content:space-between;align-items:center;margin-top:24px"><span>Evolución de Grasa</span>${fDiffStr}</div>
      <div class="card" style="position:relative;height:180px;padding:10px">
          ${S.bodyMetrics.length > 0 ? `<canvas id="fatChart"></canvas>` : `<div class="empty" style="padding:20px 10px"><div class="empty-ico">📉</div><div class="empty-s">Añade tu % de grasa al generar un informe.</div></div>`}
      </div>

      <div class="slabel" style="margin-top:24px">Estadísticas Globales</div>
      <div class="card">
         <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0">
            <div style="font-weight:600">Total de entrenos</div>

            },

        });

  },

  // ── DIARIO INTEGRAL (CALENDARIO + COMIDAS + ENTRENOS) ──
  Daily(){
    const hasS=!!(S.stravaAccessToken) || !!(S.hevyApiKey);
    return `<div class="screen">
      <div class="header"><div class="h-back" onclick="App.go('home')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Inicio</div><div class="h-title">Diario Integral</div><div style="width:60px"></div></div>
      ${!hasS?`<div class="warn-banner"><div class="warn-title">⚡ Sin apps de entreno</div><div class="warn-desc">Conecta Strava o Hevy en Ajustes para ver tus entrenos aquí.</div><button class="btn" onclick="App.go('settings')" style="max-width:160px;font-size:13px;padding:10px">Ajustes</button></div>`:''}
      
      <div class="cal-nav"><div class="cal-nav-btn" onclick="App.calMove(-1)">‹</div><div class="cal-month" id="calTitle">—</div><div class="cal-nav-btn" onclick="App.calMove(1)">›</div></div>
      <div style="padding:0 12px;margin-bottom:6px;border-bottom:0.5px solid var(--border);padding-bottom:16px">
        <table class="cal-table" id="calTable"><thead><tr>${['L','M','X','J','V','S','D'].map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody id="calBody"></tbody></table>
      </div>
      
      <div id="dayDetail" style="margin-top:10px"></div>
    </div>`;
  },

  drawCal(){
    const y = S.calYear;
    const m = S.calMonth;
    const titleEl=document.getElementById('calTitle');
    const bodyEl=document.getElementById('calBody');
    if(!titleEl||!bodyEl)return;
    const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    titleEl.textContent=`${MONTHS[m]} ${y}`;
    const todayStr=todayKey();
    const firstDow=new Date(y,m,1).getDay();
    const offset=(firstDow+6)%7;
    const totalDays=new Date(y,m+1,0).getDate();
    const totalCells=Math.ceil((offset+totalDays)/7)*7;
    let rows='',cell=0;
    
    for(let row=0;row<totalCells/7;row++){
      rows+='<tr>';
      for(let col=0;col<7;col++){
        const idx=row*7+col;
        if(idx<offset||idx>=offset+totalDays){rows+=`<td><div class="cal-d empty"></div></td>`;cell++;continue;}
        const d=idx-offset+1;
        const k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday=k===todayStr;
        const hasDot=!!(S.stravaCache[k]?.length||S.foodLogs[k]?.length||(S.hevyCache&&S.hevyCache[k]?.length));
        const isSel=S.dailyDate===k;
        rows+=`<td><div class="cal-d${isToday?' today':''}${hasDot?' has-dot':''}${isSel&&!isToday?' sel':''}" onclick="App.pickDay('${k}')">${d}</div></td>`;
        cell++;
      }
      rows+='</tr>';
    }
    bodyEl.innerHTML=rows;
    const show=S.dailyDate||todayStr;
    if(show)this.loadDay(show);
  },

  calMove(d){S.calMonth+=d;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}this.drawCal();},

  pickDay(k){
    S.dailyDate=k;
    document.querySelectorAll('#calBody .cal-d').forEach(el=>el.classList.remove('sel'));
    const d=parseInt(k.split('-')[2]);
    const cells=document.querySelectorAll('#calBody .cal-d:not(.empty)');
    cells.forEach(el=>{if(parseInt(el.textContent)===d&&!el.classList.contains('today'))el.classList.add('sel');});
    this.loadDay(k);
  },

  async loadDay(k){
    const el=document.getElementById('dayDetail');if(!el)return;
    const acts=S.stravaCache[k]||[];
    const hevyActs=(S.hevyCache&&S.hevyCache[k])||[];
    const logs=S.foodLogs[k]||[];
    const tot=logs.reduce((a,l)=>({kcal:a.kcal+(l.totals?.kcal||0),p:a.p+(l.totals?.protein||0),c:a.c+(l.totals?.carbs||0),f:a.f+(l.totals?.fat||0)}),{kcal:0,p:0,c:0,f:0});

    let html=`<div style="text-align:center;font-size:16px;font-weight:700;color:var(--text);margin:0 0 20px">${fmtDate(k)}</div>`;

    if(!acts.length && !logs.length && !hevyActs.length){
       html+=`<div class="empty" style="padding:10px 24px"><div class="empty-ico">📭</div><div class="empty-t">Sin datos este día</div><div class="empty-s">No hay comidas ni entrenamientos registrados.</div></div>`;
       el.innerHTML=html; return;
    }

    if(logs.length>0){
      html+=`<div style="margin:0 16px 14px;background:linear-gradient(135deg,rgba(52,199,89,0.15),rgba(52,199,89,0.05));border:0.5px solid rgba(52,199,89,0.2);border-radius:var(--rl);padding:20px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Calorías ingeridas</div>
        <div style="font-size:52px;font-weight:800;color:var(--text);letter-spacing:-2px;line-height:1">${Math.round(tot.kcal)}</div>
        <div style="font-size:14px;color:var(--text3);margin-top:4px">kcal</div>
      </div>`;
      if(tot.kcal>0){
         html+=`<div style="padding:0 16px;margin-bottom:16px"><div class="macro-row">
           <div class="macro-pill"><div class="val" style="color:var(--blue)">${Math.round(tot.p)}g</div><div class="lbl">Proteína</div></div>
           <div class="macro-pill"><div class="val" style="color:var(--amber)">${Math.round(tot.c)}g</div><div class="lbl">Carbos</div></div>
           <div class="macro-pill"><div class="val" style="color:var(--orange)">${Math.round(tot.f)}g</div><div class="lbl">Grasa</div></div>
         </div></div>`;
      }
      html+=`<div class="slabel">Resumen de Comidas</div>${logs.map((l, i)=>`<div class="food-log-item" onclick="App.viewLog('${k}', ${i})">
        <div style="flex:1">
          <div class="fli-meal">${mealE(l.meal)} ${l.meal}</div>
          <div class="fli-ingr">${(l.ingredients||[]).slice(0,3).map(x=>x.name?.split(' ')[0]).join(', ')}${(l.ingredients||[]).length>3?'…':''}</div>
        </div>
        <div style="text-align:right;margin-right:8px">
          <div class="fli-kcal">${Math.round(l.totals?.kcal||0)} kcal</div>
          <div class="fli-macros">P:${Math.round(l.totals?.protein||0)}g · C:${Math.round(l.totals?.carbs||0)}g</div>
        </div>
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:2.5;flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('')}`;
    }

    if(acts.length>0 || hevyActs.length>0) {
        html+=`<div class="slabel" style="margin-top:24px">Resumen de Entrenos</div>`;
    }
    
    if(acts.length>0){
      html+= acts.map((a, idx)=>{
        const dist = a.distance ? (a.distance/1000).toFixed(2)+' km' : null;
        const time = a.moving_time ? fmtTime(a.moving_time) : '—';
        const isRun = a.type==='Run' || a.type==='Walk' || a.type==='Ride' || a.type==='Hike';
        const isStrength = a.type==='WeightTraining' || a.type==='Workout';
        
        let statsHtml = '';
        if(isStrength) {
            statsHtml = `<div class="stat-box"><div class="stat-v">${time}</div><div class="stat-l">Tiempo</div></div>
            <div class="stat-box"><div class="stat-v">${a.average_heartrate?Math.round(a.average_heartrate)+' bpm':'—'}</div><div class="stat-l">FC Media</div></div>
            <div class="stat-box"><div class="stat-v">${a.max_heartrate?Math.round(a.max_heartrate)+' bpm':'—'}</div><div class="stat-l">FC Máx</div></div>`;
        } else {
            const third = isRun&&a.average_speed ? fmtPace(a.average_speed) : (a.average_heartrate?Math.round(a.average_heartrate)+' bpm':'—');
            const thirdLbl = isRun&&a.average_speed ? 'Ritmo' : 'FC media';
            statsHtml = `<div class="stat-box"><div class="stat-v">${dist||'—'}</div><div class="stat-l">Distancia</div></div>
            <div class="stat-box"><div class="stat-v">${time}</div><div class="stat-l">Tiempo</div></div>
            <div class="stat-box"><div class="stat-v">${third}</div><div class="stat-l">${thirdLbl}</div></div>`;
        }

        return `<div class="activity-card" onclick="App.showActDetails('${k}', ${idx})">
          <div class="act-type-badge">${actE(a.type)} ${actN(a.type)}</div>
          <div class="act-name">${a.name}</div>
          <div class="act-stats">${statsHtml}</div>
          ${a.kilojoules?`<div style="margin-top:10px;font-size:13px;color:var(--text2)">⚡ ${Math.round(a.kilojoules*0.239)} kcal estimadas</div>`:''}
          <div style="margin-top:12px;font-size:12px;color:var(--accent);text-align:center;font-weight:600;background:var(--bg3);padding:6px;border-radius:6px">Toca para ver todos los detalles 👇</div>
        </div>`;
      }).join('');
    }

    if(hevyActs.length>0){
       html+= hevyActs.map((a, idx)=>{
           const start = new Date(a.start_time).getTime();
           const end = new Date(a.end_time).getTime();
           const time = (end-start)/1000;
           const timeStr = fmtTime(time);
           const vol = a.volume_kg ? Math.round(a.volume_kg)+' kg' : '—';
           const pr = a.pr_count ? a.pr_count + ' PRs' : '—';
           return `<div class="activity-card" onclick="App.showHevyDetails('${k}', ${idx})">
              <div class="act-type-badge act-type-badge-hevy">🏋️ ${a.title || 'Pesas'}</div>
              <div class="act-name">${a.name || a.title || 'Entrenamiento de fuerza'}</div>
              <div class="act-stats">
                 <div class="stat-box"><div class="stat-v">${timeStr}</div><div class="stat-l">Tiempo</div></div>
                 <div class="stat-box"><div class="stat-v">${vol}</div><div class="stat-l">Volumen</div></div>
                 <div class="stat-box"><div class="stat-v">${pr}</div><div class="stat-l">Récords</div></div>
              </div>
              <div style="margin-top:12px;font-size:12px;color:var(--purple);text-align:center;font-weight:600;background:var(--bg3);padding:6px;border-radius:6px">Toca para ver rutina (JSON) 👇</div>
           </div>`;
       }).join('');
    }

    el.innerHTML=html;
  },

  weekStats(){
    const {s, e} = this.getReportRange();
    const dts = [];
    let curr = new Date(s.split('-')[0], s.split('-')[1]-1, s.split('-')[2]);
    const endDt = new Date(e.split('-')[0], e.split('-')[1]-1, e.split('-')[2]);
    while(curr <= endDt) { dts.push(dKey(curr)); curr.setDate(curr.getDate()+1); }
    
    const data=[];
    dts.forEach(k => {
      const logs=S.foodLogs[k]||[];
      if(logs.length){
        const t=logs.reduce((a,l)=>({kcal:a.kcal+(l.totals?.kcal||0),p:a.p+(l.totals?.protein||0)}),{kcal:0,p:0});
        data.push({k,t,meals:logs.length});
      }
    });

    const daysDiff = dts.length;
    if(!data.length)return `<div style="font-size:14px;color:var(--text2)">Sin registros nutricionales en este período (${daysDiff} días). El informe usará datos de entreno y métricas corporales.</div>`;
    
    const avg=Math.round(data.reduce((acc,d)=>acc+d.t.kcal,0)/data.length);
    const avgP=Math.round(data.reduce((acc,d)=>acc+d.t.p,0)/data.length);
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent)">${avg}</div><div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-top:2px">Kcal media/día</div></div><div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--blue)">${avgP}g</div><div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-top:2px">Proteína media</div></div></div><div style="font-size:13px;color:var(--text2)">${data.length} día${data.length!==1?'s':''} con registros de los ${daysDiff} seleccionados.</div>`;
  },

  handleImgs(e){
    S.weekImages=[];const prev=document.getElementById('imgPrevs');prev.innerHTML='';
    Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>{S.weekImages.push({data:ev.target.result.split(',')[1],mimeType:file.type});const img=document.createElement('img');img.src=ev.target.result;img.className='img-prev';prev.appendChild(img);};r.readAsDataURL(file);});
  },

  async genReport(){
    const goal=document.getElementById('wgoal')?.value.trim();
    if(!goal){toast('Escribe tu objetivo primero','err');return;}
    S.weekGoal=goal;
    
    const mH = document.getElementById('mHeight')?.value.trim();
    const mW = document.getElementById('mWeight')?.value.trim();
    const mF = document.getElementById('mFat')?.value.trim();
    
    if (mH && !S.userHeight) { S.userHeight = mH; }

    if (mW || mF) {
       const tk = todayKey();
       const existingIdx = S.bodyMetrics.findIndex(m => m.date === tk);
       const mData = {
           date: tk,
           weight: mW ? parseFloat(mW) : (existingIdx>=0 ? S.bodyMetrics[existingIdx].weight : null),
           fat: mF ? parseFloat(mF) : (existingIdx>=0 ? S.bodyMetrics[existingIdx].fat : null)
       };
       if(existingIdx >= 0) S.bodyMetrics[existingIdx] = mData;
       else S.bodyMetrics.push(mData);
       S.bodyMetrics.sort((a,b) => a.date.localeCompare(b.date));
       save();
    }

    let manualMetrics = '';
    if(S.userHeight || mW || mF) {
       manualMetrics = `\nMÉTRICAS CORPORALES:\n`;
       if(S.userHeight) manualMetrics += `- Altura: ${S.userHeight} cm\n`;
       if(mW) manualMetrics += `- Peso: ${mW} kg\n`;
       if(mF) manualMetrics += `- Porcentaje de grasa: ${mF}%\n`;
    }

    setHTML('<div class="loading"><div class="spinner"></div><div>Generando informe...</div><div style="font-size:12px;color:var(--text3)">Analizando el periodo seleccionado</div></div>');
    
    const {s, e} = this.getReportRange();
    const dts = [];
    let curr = new Date(s.split('-')[0], s.split('-')[1]-1, s.split('-')[2]);
    const endDt = new Date(e.split('-')[0], e.split('-')[1]-1, e.split('-')[2]);
    while(curr <= endDt) { dts.push(dKey(curr)); curr.setDate(curr.getDate()+1); }
    
    const weekLogs=[];
    dts.forEach(k => {
      const logs = S.foodLogs[k]||[];
      if(logs.length){
        const t = logs.reduce((a,l)=>({kcal:a.kcal+(l.totals?.kcal||0),protein:a.protein+(l.totals?.protein||0),carbs:a.carbs+(l.totals?.carbs||0),fat:a.fat+(l.totals?.fat||0)}),{kcal:0,protein:0,carbs:0,fat:0});
        weekLogs.push({date:k,meals:logs.length,t});
      }
    });

    const strStr=Object.entries(S.stravaCache).filter(([k,v])=>v&&v.length&&dts.includes(k)).map(([k,acts])=>`${k}: ${acts.map(a=>actN(a.type)+' '+(a.distance?((a.distance/1000).toFixed(1)+'km'):'')+' '+fmtTime(a.moving_time||0)).join(', ')}`).join('\n');
    const hevyStr=Object.entries(S.hevyCache).filter(([k,v])=>v&&v.length&&dts.includes(k)).map(([k,acts])=>`${k}: ${acts.map(a=>'Fuerza '+(a.title||'')+' '+(a.volume_kg?a.volume_kg+'kg':'')+' PRs:'+(a.pr_count||0)).join(', ')}`).join('\n');
    
    let allEntrenos = '';
    if(strStr) allEntrenos += `\nSTRAVA:\n${strStr}\n`;
    if(hevyStr) allEntrenos += `\nHEVY:\n${hevyStr}\n`;

    const nutStr=weekLogs.map(d=>`${d.date}: ${Math.round(d.t.kcal)} kcal, P:${Math.round(d.t.protein)}g, C:${Math.round(d.t.carbs)}g, G:${Math.round(d.t.fat)}g (${d.meals} comidas)`).join('\n');
    
    const prev=S.weeklyReports.length>0?S.weeklyReports[S.weeklyReports.length-1]:null;
    const prevCtx=prev?`\nINFORME ANTERIOR (${fmtDate(prev.weekStart)} - ${fmtDate(prev.weekEnd)}):\nObjetivo anterior: ${prev.goal}\nResumen anterior:\n${prev.report.substring(0,1000)}\n`:'';
    
    const timeStr = new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});

    const parts=[{text:`Eres un coach de fitness y nutrición de élite. Genera un informe detallado y motivador.

PERÍODO A ANALIZAR: Desde el ${fmtDate(s)} hasta el ${fmtDate(e)}

CONTEXTO TEMPORAL Y REGLAS CLAVE:
- Hoy es ${fmtDate(todayKey())}, hora actual: ${timeStr}. Si el día de hoy tiene pocas calorías o comidas, ten en cuenta que puede ser temprano y aún faltan comidas por hacer. NO te alarmes asumiendo que ha comido poco si aún no ha terminado el día.
- Si en el historial hay días enteros sin ningún registro de comida, asume de inmediato que el usuario NO usó la app ni registró sus datos ese día. NO ASUMAS QUE AYUNÓ NI QUE COMIÓ 0 CALORÍAS. Excluye por completo esos días vacíos de tus cálculos de medias para no distorsionar la realidad.

OBJETIVO ACTUAL: ${goal}
${prevCtx}
NUTRICIÓN (del período seleccionado):
${nutStr||'Sin registros nutricionales.'}

ENTRENAMIENTOS (del período seleccionado):
${allEntrenos||'Sin datos de entrenos.'}
${manualMetrics}
${S.weekImages.length>0?`\nSe adjuntan ${S.weekImages.length} imagen(es) de la báscula.`:'Sin capturas de báscula.'}

Genera el informe con estas secciones en markdown:
## Resumen ejecutivo
## Análisis nutricional
## Análisis del entrenamiento
${(S.weekImages.length>0 || manualMetrics)?'## Composición corporal\n':''}${prev?'## Comparativa anterior\n':''}## Conclusiones y objetivos

INSTRUCCIONES CLAVE E INFLEXIBLES:
1. El informe DEBE ser MUY CORTO, conciso y directo al grano.
2. Usa viñetas para que sea visual y fácil de escanear.
3. Omite introducciones largas o conclusiones repetitivas y de relleno.
4. Da recomendaciones numéricas precisas.
5. Usa máximo 400 palabras.`}];
    
    S.weekImages.forEach(img=>parts.push({inline_data:{mime_type:img.mimeType,data:img.data}}));
    
    try{
      const report=await callGemini(parts,4000,0.7);
      const obj={id:Date.now(),weekStart:s,weekEnd:e,goal,report,at:new Date().toISOString()};
      S.weeklyReports.push(obj);
      S.viewingReport=obj;
      save();
      this.go('weekly-report', {nav: 'progress'});
    }catch(err){
      setHTML(`<div class="loading"><div style="font-size:32px">⚠️</div><div style="color:var(--red);font-weight:600">Error al generar</div><div style="font-size:13px;color:var(--text3);text-align:center;max-width:280px">${err.message}</div><div style="margin-top:20px"><button class="btn" onclick="App.go('weekly-gen', {nav:'progress'})" style="max-width:160px;font-size:14px">Volver</button></div></div>`);
    }
  },

  WeeklyReport(){
    const r=S.viewingReport;if(!r)return this.Progress();
    const html=r.report
      .replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^[-•*]\s+(.+)$/gm,'<div class="bullet"><span class="bullet-dot">●</span><span>$1</span></div>')
      .replace(/^\d+\.\s+(.+)$/gm,'<div class="bullet"><span class="bullet-dot" style="color:var(--blue)">›</span><span>$1</span></div>')
      .replace(/\n\n/g,'<div style="height:8px"></div>').replace(/\n/g,'<br>');
    return `<div class="screen">
      <div class="header"><div class="h-back" onclick="App.go('progress')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Atrás</div><div class="h-title">Informe</div><div style="width:60px"></div></div>
      <div style="padding:8px 20px 16px"><div style="font-size:13px;color:var(--text3);font-weight:600">📅 ${fmtDate(r.weekStart)} → ${fmtDate(r.weekEnd)}</div><div style="margin-top:8px;background:var(--accentBg);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--accent);font-weight:600">🎯 ${r.goal.substring(0,80)}${r.goal.length>80?'...':''}</div></div>
      <div class="report-body">${html}</div>
    </div>`;
  }
};

document.addEventListener('DOMContentLoaded',()=> {
  App.render();
  App.syncStrava();
  App.syncHevy();
});
</script>
</body>
</html>
